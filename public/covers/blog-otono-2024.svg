<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="autumn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4a35a"/>
      <stop offset="100%" stop-color="#a8853a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#autumn)"/>
  <!-- falling leaves pattern -->
  <g opacity="0.15" fill="#f5efe0">
    <ellipse cx="150" cy="100" rx="25" ry="10" transform="rotate(-40 150 100)"/>
    <ellipse cx="650" cy="80" rx="20" ry="8" transform="rotate(30 650 80)"/>
    <ellipse cx="300" cy="350" rx="22" ry="9" transform="rotate(-20 300 350)"/>
    <ellipse cx="550" cy="320" rx="18" ry="7" transform="rotate(45 550 320)"/>
    <ellipse cx="100" cy="300" rx="20" ry="8" transform="rotate(15 100 300)"/>
    <ellipse cx="700" cy="250" rx="24" ry="9" transform="rotate(-35 700 250)"/>
  </g>
  <!-- title -->
  <text x="400" y="190" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="#f5efe0" letter-spacing="2">Novedades</text>
  <line x1="300" y1="210" x2="500" y2="210" stroke="#f5efe0" stroke-width="1" opacity="0.5"/>
  <text x="400" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#f5efe0" letter-spacing="4">OTOÑO 2024</text>
</svg>
