<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#f5efe0"/>
  <rect x="0" y="0" width="800" height="450" fill="#1a2a5e" opacity="0.06"/>
  <!-- decorative quote marks -->
